<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{project_name}} — framed</title>
{{google_fonts_link}}
<style>
  :root {
    --bg-deep: #050302;
    --bg-warm: #1a1311;
    --rule: {{palette_rule}};
    --brass: {{palette_accent}};
    --brass-dim: #a37e53;
    --bone: {{palette_fg}};
    --bone-faint: {{palette_fg_faint}};
    --desk: #0c0907;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-deep);
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: "{{font_body}}", -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  }

  /* Real photo backdrop — laptop on desk by window with view */
  .scene {
    position: fixed; inset: 0;
    background:
      url('{{backdrop_source}}') center center / cover no-repeat,
      var(--bg-warm);
  }
  /* Subtle blur + darken so terminal stands out without losing the photo */
  .scene::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 1500px 950px at 50% 50%, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.78) 100%);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  /* Warm screen glow lighting the "room" around terminal */
  .scene::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(ellipse 1100px 720px at 50% 50%, rgba(219,175,113,0.12) 0%, transparent 55%);
    mix-blend-mode: screen;
  }
  /* Tiny noise pattern for parchment feel */
  .scene::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 23% 12%, rgba(255,240,210,0.015) 0%, transparent 8%),
      radial-gradient(circle at 78% 88%, rgba(255,240,210,0.012) 0%, transparent 10%);
  }

  /* Centered "monitor" — semi-transparent with soft fading edges */
  .terminal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1400px; height: 825px;
    background: rgba(10, 7, 5, 0.86);   /* 14% see-through so backdrop bleeds in */
    backdrop-filter: blur(14px) saturate(1.1);
    -webkit-backdrop-filter: blur(14px) saturate(1.1);
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 60px 140px rgba(0,0,0,0.85),
      0 25px 70px rgba(0,0,0,0.65),
      0 0 0 1px rgba(219,175,113,0.14),
      0 0 120px rgba(219,175,113,0.12),
      inset 0 0 60px rgba(0,0,0,0.45);
    /* Soft edge mask — fades borders into backdrop */
    -webkit-mask-image:
      radial-gradient(ellipse 102% 102% at center, black 78%, rgba(0,0,0,0.4) 96%, transparent 100%);
    mask-image:
      radial-gradient(ellipse 102% 102% at center, black 78%, rgba(0,0,0,0.4) 96%, transparent 100%);
    display: flex; flex-direction: column;
  }
  /* Subtle "monitor glow" reflection on desk surface */
  .terminal::after {
    content: '';
    position: absolute; left: 5%; right: 5%; bottom: -40px; height: 80px;
    background: radial-gradient(ellipse, rgba(219,175,113,0.12), transparent 70%);
    pointer-events: none;
    transform: translateY(100%);
  }

  /* Title bar — semi-transparent so backdrop blur shows through */
  .titlebar {
    height: 38px;
    background: linear-gradient(180deg, rgba(31,25,22,0.65), rgba(21,17,15,0.75));
    border-bottom: 1px solid rgba(219,175,113,0.08);
    display: flex; align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .lights { display: flex; gap: 8px; }
  .light {
    width: 12px; height: 12px; border-radius: 999px;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.35);
  }
  .light.r { background: {{mem_decision}}; }
  .light.y { background: {{palette_accent}}; }
  .light.g { background: {{mem_skill}}; }
  .title {
    flex: 1; text-align: center;
    color: var(--bone-faint);
    font-family: "{{font_mono}}", ui-monospace, monospace;
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .title .accent { color: var(--brass); }

  /* Video content area */
  .screen {
    flex: 1;
    background: {{palette_bg}};
    position: relative;
    overflow: hidden;
  }
  video {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
  }
</style>
</head>
<body>

<div class="scene"></div>

<div class="terminal">
  <div class="titlebar">
    <div class="lights">
      <div class="light r"></div>
      <div class="light y"></div>
      <div class="light g"></div>
    </div>
    <div class="title">◐ &nbsp;<span class="accent">{{project_version_tag}}</span>&nbsp; — {{project_url}}</div>
  </div>
  <div class="screen" id="screen">
    <video id="vid" src="videos/final-with-captions.mp4" autoplay muted playsinline></video>
  </div>
</div>

<script>
  // ?bg=1 mode: remove video so ffmpeg overlay can paste its own
  if (new URLSearchParams(location.search).has('bg')) {
    document.getElementById('vid').remove();
    document.getElementById('screen').style.background = '#000';
  } else {
    const v = document.getElementById('vid');
    v.play().catch(e => console.warn('autoplay blocked', e));
  }
</script>
</body>
</html>
